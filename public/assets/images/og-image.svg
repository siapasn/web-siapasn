<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f2744"/>
      <stop offset="60%"  stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#1e5080"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d4891a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80"  r="220" fill="rgba(245,166,35,0.06)"/>
  <circle cx="150"  cy="550" r="180" fill="rgba(245,166,35,0.05)"/>
  <circle cx="980"  cy="500" r="120" fill="rgba(255,255,255,0.03)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Left accent line -->
  <rect x="80" y="180" width="5" height="270" rx="3" fill="#f5a623"/>

  <!-- Main title -->
  <text x="120" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">SiapASN</text>
  <text x="120" y="350" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="#f5a623" letter-spacing="-1">Simulation Center</text>

  <!-- Subtitle -->
  <text x="120" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.75)">Platform Tryout CPNS &amp; PPPK Terpercaya</text>

  <!-- Feature pills -->
  <rect x="120" y="450" width="200" height="44" rx="22" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
  <text x="220" y="478" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#f5a623" text-anchor="middle">Bank Soal SKD &amp; SKB</text>

  <rect x="340" y="450" width="200" height="44" rx="22" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
  <text x="440" y="478" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#f5a623" text-anchor="middle">Analisis Nilai Real-time</text>

  <rect x="560" y="450" width="200" height="44" rx="22" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
  <text x="660" y="478" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#f5a623" text-anchor="middle">Pembahasan Lengkap</text>

  <!-- Domain -->
  <text x="120" y="570" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.45)">siapasnsimulationcenter.id</text>

  <!-- Right side icon area -->
  <rect x="850" y="160" width="260" height="260" rx="32" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <text x="980" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="120" fill="rgba(245,166,35,0.8)" text-anchor="middle">&#x1F4CB;</text>
</svg>
