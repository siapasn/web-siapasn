; PHP Configuration untuk SiapASN di Shared Hosting
; File ini dibaca oleh Apache di folder public/

; PHP Version minimum 8.2
; Pastikan sudah set PHP 8.2 di cPanel → PHP Selector / MultiPHP Manager

; Error handling — sembunyikan error di production
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Upload settings
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 120
max_input_time = 120
memory_limit = 256M

; Session
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

; Timezone
date.timezone = Asia/Jakarta

; Ekstensi yang dibutuhkan CI4
; (biasanya sudah aktif di shared hosting)
; extension=mysqli
; extension=mbstring
; extension=json
; extension=curl
; extension=openssl
; extension=intl
